<!DOCTYPE html>
<head>
    <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jersey+10&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Foro Hub</h1>
    </header>
    <main class="login-visual">
        <form  method="" class="form-box" autocomplete="on" id="form">
            <fieldset class="content-form">
                
                <legend>¡ Bienvenida/o !</legend>
                    <div class="labels-form">
                    <label for="user" >Email:</label>
                    <input type="email" id="user" name="user" placeholder="tumail@gmail.com" required>
            
                    <label for="pass" >Contraseña:</label>
                    <input type="password" id="pass" name="password" placeholder="*******" required>
                    </div>

                    <button type="submit"  >Login</button>
                    <a href="">¿No posees cuenta aún?<b> Registrate</b></a>
                
            </fieldset>
        </form>
   
    <section class="aside-visual">
        <img src="/front/img/login-notebook.svg" alt="imagen-notebook" class="login-notebook-img">
        <div></div>
    </section>
  
     </main>
       <footer> </footer>
    <script src="/script/login.js"></script>
</body>
</html>
