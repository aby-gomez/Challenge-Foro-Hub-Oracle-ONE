<head>

   <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="body-dash">
    <section class="container-layout">
        <header class="header-dash">
          

                <a class="header-logo" href="#">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="white">
                            <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
                        </svg>
                    </div>
                    <span class="logo-name">Foro<span>Hub</span></span>
                </a>

                <div class="search">
                    <input type="text" name="search" placeholder="Buscar..."><button type="submit"><img src="/front/img/search.svg" ></button>
                 </div>

                <div class="header-right">
                    <button class="notif-btn" title="Notificaciones">
                    <div class="notif-dot"></div>
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor">
                    <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5S10.5 3.17 10.5 4v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/>
                    </svg>
                     </button>

                    <div class="avatar-wrap" id="avatar-btn">
                        <div class="avatar-circle" id="avatar-initials">MG</div>
                            <span class="avatar-name" id="avatar-name">María G.</span>
                            <span class="avatar-caret">▾</span>
                        </div>
                    </div>

                </div>
            
        </header>

        <aside class="aside-dash">
            <nav class="nav-dash" id="left-nav">
                <ul>
                    <li id="inicio">Inicio</li>
                    <li id="crear-topico" >Crear tópico</li>
                    <li id="/ver-tus-topicos">Ver tus tópicos</li>
                </ul>
            </nav>
        </aside>
        <main class="main-container" id="main-container">
            <div class="card-container" id="container">
                
            </div>
            <div id="modalDetalle" >
                <div id="contenidoModal" class="contenidoModal">
                </div>
            </div>
        </main>

        <footer class="footer-dash"> </footer>
       </section>
    <script type="module" src="/script/dashboard.js"></script>
</body>
</html>
